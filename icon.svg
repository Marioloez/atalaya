<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="48" fill="#0E639C"/>

  <!-- table grid -->
  <g transform="translate(40, 56)">
    <!-- header row background -->
    <rect width="176" height="36" rx="6" fill="#FFFFFF" fill-opacity="0.30"/>

    <!-- outer border -->
    <rect width="176" height="144" rx="6" fill="none" stroke="#FFFFFF" stroke-width="4"/>

    <!-- vertical separators -->
    <line x1="58.6" y1="0" x2="58.6" y2="144" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="117.3" y1="0" x2="117.3" y2="144" stroke="#FFFFFF" stroke-width="3"/>

    <!-- horizontal separators -->
    <line x1="0" y1="36" x2="176" y2="36" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="0" y1="72" x2="176" y2="72" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="0" y1="108" x2="176" y2="108" stroke="#FFFFFF" stroke-width="3"/>
  </g>
</svg>
